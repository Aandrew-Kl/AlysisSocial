<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />

  <title>AlysisAI — AI, technology and digital presence</title>
  <meta name="description" content="AlysisAI digital contact card. Connect with us via our website, LinkedIn, X, or email." />
  <meta name="keywords" content="AlysisAI, AI, technology, digital presence, contact, Andreas Klimentidis" />
  <meta name="author" content="AlysisAI" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="profile" />
  <meta property="og:site_name" content="AlysisAI" />
  <meta property="og:title" content="AlysisAI — AI, technology and digital presence" />
  <meta property="og:description" content="Digital contact card for AlysisAI. AI, technology and digital presence." />
  <meta property="og:url" content="https://alysisai.com/" />
  <meta property="og:image" content="https://alysisai.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@AlysisAI" />
  <meta name="twitter:creator" content="@AlysisAI" />
  <meta name="twitter:title" content="AlysisAI — AI, technology and digital presence" />
  <meta name="twitter:description" content="Digital contact card for AlysisAI." />
  <meta name="twitter:image" content="https://alysisai.com/og-image.png" />

  <link rel="canonical" href="https://alysisai.com/" />

  <!-- Favicon — dark "A-chain" logo for light tabs, white version for dark tabs -->
  <link rel="icon" type="image/png" href="logo-dark.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="logo.png"      media="(prefers-color-scheme: dark)" />
  <link rel="apple-touch-icon" href="logo-dark.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=2" />

  <!-- Structured data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "AlysisAI",
    "url": "https://alysisai.com/",
    "description": "AI, technology and digital presence",
    "sameAs": [
      "https://www.linkedin.com/company/alysisai",
      "https://x.com/AlysisAI"
    ]
  }
  </script>
</head>
<body>
  <!-- Ambient aurora background -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__blob aurora__blob--purple"></div>
    <div class="aurora__blob aurora__blob--cyan"></div>
    <div class="aurora__blob aurora__blob--pink"></div>
  </div>

  <main class="card" role="main">

    <!-- ============ HEADER ============ -->
    <header class="header">
      <a class="logo-link"
         href="https://alysisai.com/"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Open alysisai.com">
        <img class="logo-mark" src="logo.png" width="92" height="86" alt="AlysisAI logo" />
      </a>
      <h1 class="brand">AlysisAI</h1>
      <p class="subtitle">AI, technology and digital presence</p>
    </header>

    <!-- ============ CONTACT LINKS ============ -->
    <nav class="links" aria-label="Contact links">

      <a class="link-btn link-btn--website"
         href="https://alysisai.com/"
         target="_blank"
         rel="noopener noreferrer">
        <span class="link-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
        </span>
        <span class="link-btn__label">
          <span class="link-btn__title">Official Website</span>
          <span class="link-btn__sub">alysisai.com</span>
        </span>
        <span class="link-btn__arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"></path>
            <path d="M8 7h9v9"></path>
          </svg>
        </span>
      </a>

      <a class="link-btn link-btn--linkedin"
         href="https://www.linkedin.com/company/alysisai"
         target="_blank"
         rel="noopener noreferrer">
        <span class="link-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.063 2.063 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
          </svg>
        </span>
        <span class="link-btn__label">
          <span class="link-btn__title">LinkedIn — AlysisAI</span>
          <span class="link-btn__sub">Company page</span>
        </span>
        <span class="link-btn__arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"></path>
            <path d="M8 7h9v9"></path>
          </svg>
        </span>
      </a>

      <a class="link-btn link-btn--linkedin"
         href="https://www.linkedin.com/in/andreas-klimentidis-b2b9b3211/"
         target="_blank"
         rel="noopener noreferrer">
        <span class="link-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.063 2.063 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
          </svg>
        </span>
        <span class="link-btn__label">
          <span class="link-btn__title">LinkedIn — Andreas Klimentidis</span>
          <span class="link-btn__sub">Personal profile</span>
        </span>
        <span class="link-btn__arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"></path>
            <path d="M8 7h9v9"></path>
          </svg>
        </span>
      </a>

      <a class="link-btn link-btn--x"
         href="https://x.com/AlysisAI"
         target="_blank"
         rel="noopener noreferrer">
        <span class="link-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
          </svg>
        </span>
        <span class="link-btn__label">
          <span class="link-btn__title">AlysisAI on X</span>
          <span class="link-btn__sub">@AlysisAI</span>
        </span>
        <span class="link-btn__arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"></path>
            <path d="M8 7h9v9"></path>
          </svg>
        </span>
      </a>

      <!--
        ============================================================
          EMAIL — REPLACE THIS BLOCK
          To update the contact email, change the address in BOTH:
            1) the href attribute below   (mailto:...)
            2) the visible text inside  <span id="email-display">
          That's it. Nothing else needs to change.
        ============================================================
      -->
      <a class="link-btn link-btn--email"
         id="email-link"
         href="mailto:info@alysisai.com">
        <span class="link-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </span>
        <span class="link-btn__label">
          <span class="link-btn__title">Send an email</span>
          <span class="link-btn__sub" id="email-display">info@alysisai.com</span>
        </span>
        <span class="link-btn__arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"></path>
            <path d="M8 7h9v9"></path>
          </svg>
        </span>
      </a>

    </nav>

    <!-- ============ SHARE BUTTON ============ -->
    <button class="share-btn" id="share-btn" type="button" aria-label="Share this profile">
      <span class="share-btn__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path>
          <polyline points="16 6 12 2 8 6"></polyline>
          <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
      </span>
      <span class="share-btn__label">Share Profile</span>
    </button>

    <!-- ============ QR CODE ============ -->
    <!-- The QR encodes the URL of this page. Scanning it opens the card
         in a browser where every social link is a clean, labelled button.
         The visible URL below is filled in by JS from window.location. -->
    <section class="qr" aria-labelledby="qr-title">
      <p id="qr-title" class="qr__title">Scan to open card</p>
      <div class="qr__frame">
        <span class="qr__bracket qr__bracket--tl" aria-hidden="true"></span>
        <span class="qr__bracket qr__bracket--tr" aria-hidden="true"></span>
        <span class="qr__bracket qr__bracket--bl" aria-hidden="true"></span>
        <span class="qr__bracket qr__bracket--br" aria-hidden="true"></span>
        <div class="qr__card">
          <div id="qrcode" class="qr__code" role="img" aria-label="QR code linking to the AlysisAI contact card"></div>
        </div>
      </div>
      <p class="qr__url" id="qr-url">alysisai.com</p>
    </section>

    <!-- ============ FOOTER ============ -->
    <footer class="footer">
      <p>© <span id="year">2026</span> AlysisAI</p>
    </footer>

  </main>

  <!-- Toast (announcement region for share/copy feedback) -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="script.js?v=2" defer></script>
</body>
</html>
